<!DOCTYPE html>
<html lang="en">
<head>

<title>Mercury -- Profile</title>

<link rel="apple-touch-icon" href="logo/apple-touch-icon.png">
<link rel="stylesheet" href="mercury-theme.css">
<script>
  const SUPABASE_URL = "https://qzkhficwcpicglywmcid.supabase.co";
  const SUPABASE_KEY = "sb_publishable_t2IT_8t6w8cYP5aipFHWVQ_ESPnRjKG";
</script>
<style>
  body { padding: 24px 22px 100px; }
  h1 { font-size: 20px; font-weight: 700; }
  h2 { font-size: 13px; color: var(--text-muted); margin-top: 24px; text-transform: uppercase; letter-spacing: .05em; }
  label { display: block; font-size: 12px; color: var(--text-muted); margin-top: 12px; }
  input, select, textarea {
    width: 100%; box-sizing: border-box; padding: 10px; border-radius: 10px;
    border: 1px solid var(--card-border); background: var(--card-bg); color: var(--text);
    margin-top: 4px; font-family: 'Archivo', sans-serif;
  }
  textarea { min-height: 50px; }
  .club-row { position: relative; margin-top: 14px; }
  .club-row .remove-btn { position: absolute; top: 12px; right: 12px; background: rgba(226,75,74,.15); color: #f0999b; border: none; border-radius: 8px; padding: 4px 10px; font-size: 11px; }
  #add-club-btn { width: 100%; margin-top: 14px; background: var(--card-bg); color: var(--text); border: 1px solid var(--card-border); border-radius: 12px; padding: 12px; font-weight: 600; }
  #save-btn { width: 100%; margin-top: 20px; }
  #logout-btn { width: 100%; margin-top: 10px; background: rgba(226,75,74,.12); color: #f0999b; border: none; border-radius: 12px; padding: 12px; font-weight: 600; }
  #status, #auth-status { font-size: 13px; margin-top: 10px; min-height: 16px; }
  .auth-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
  .auth-toggle button { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--card-border); background: var(--card-bg); color: var(--text); font-weight: 600; }
  .auth-toggle button.active { background: var(--accent); color: var(--on-accent); border-color: var(--accent); }
</style>
</head>
<body>

<div id="auth-screen">
  <h1>Mercury Golf</h1>
  <div class="auth-toggle">
    <button id="show-login-btn" class="active">Log in</button>
    <button id="show-signup-btn">Sign up</button>
  </div>

  <div id="login-form">
    <label>Email</label>
    <input id="login-email" type="email">
    <label>Password</label>
    <input id="login-password" type="password">
    <button id="login-btn" class="mercury-btn-primary" style="margin-top:16px; width:100%;">Log in</button>
  </div>

  <div id="signup-form" style="display:none;">
    <label>Email</label>
    <input id="signup-email" type="email">
    <label>Password (min 6 characters)</label>
    <input id="signup-password" type="password">
    <button id="signup-btn" class="mercury-btn-primary" style="margin-top:16px; width:100%;">Sign up</button>
  </div>

  <div id="auth-status"></div>
</div>

<div id="profile-form" style="display:none;">
  <h1>Edit profile</h1>

  <h2>Personal</h2>
  <label>Name</label>
  <input id="name" type="text">
  <label>Handedness</label>
  <select id="handedness">
    <option value="">Not specified</option>
    <option value="right">Right-handed</option>
    <option value="left">Left-handed</option>
  </select>
  <label>Age</label>
  <input id="age" type="number">
  <label>Handicap Index (if you have one)</label>
  <input id="handicap" type="number" step="0.1">

  <label>Home course</label>
  <select id="home-course-select"><option value="">Loading courses...</option></select>

  <h2>Your bags</h2>
  <p style="font-size:12px; color:var(--text-muted);">Getting a new club? Create a new bag for it rather than editing this one in place -- that way past rounds still show what was actually in your bag when you played them.</p>

  <label>Viewing bag</label>
  <select id="bag-select"></select>
  <div id="bag-active-status" style="font-size:12px; margin-top:6px;"></div>
  <button id="set-active-btn" type="button" style="margin-top:8px; width:100%; padding:10px; border-radius:10px; border:1px solid var(--card-border); background:var(--card-bg); color:var(--text); font-weight:600;">Set as active bag</button>
  <button id="new-bag-btn" type="button" style="margin-top:8px; width:100%; padding:10px; border-radius:10px; border:1px solid var(--card-border); background:var(--card-bg); color:var(--text); font-weight:600;">+ New bag</button>

  <p id="club-count-label" style="font-size:12px; color:var(--text-muted); margin-top:16px;"></p>
  <div id="clubs-container"></div>
  <button id="add-club-btn" type="button">+ Add a club</button>

  <h2>Your game, generally</h2>
  <label>Strengths, weaknesses, tendencies</label>
  <textarea id="game-notes"></textarea>

  <button id="save-btn" type="button" class="mercury-btn-primary">Save profile</button>
  <div id="status"></div>

  <button id="logout-btn" type="button">Log out</button>
</div>

<div class="mercury-tabbar mercury-glass">
  <a href="index.html" class="mercury-tab">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 8l7-5 7 5"/><path d="M5 8v8h10V8"/></svg>
    Home
  </a>
  <a href="stats.html" class="mercury-tab">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 16V9M10 16V4M16 16v-5"/></svg>
    Stats
  </a>
  <a href="map.html" class="mercury-tab-fab">
    <div class="fab-circle"><svg width="22" height="22" viewBox="0 0 22 22" fill="#0e1620"><path d="M7 4l11 7-11 7z"/></svg></div>
    <span>Play</span>
  </a>
  <a href="rounds.html" class="mercury-tab">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 5h12M4 10h12M4 15h12"/></svg>
    Rounds
  </a>
  <a href="profile.html" class="mercury-tab active">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="10" cy="7" r="3.2"/><path d="M4 17c0-3.3 2.7-5 6-5s6 1.7 6 5"/></svg>
    Profile
  </a>
</div>

<script>
// ===========================================================
// Auth + session helpers (same pattern reused on every page)
// ===========================================================
function getAccessToken() { return localStorage.getItem('mercuryAccessToken'); }
function getRefreshToken() { return localStorage.getItem('mercuryRefreshToken'); }
function setSession(accessToken, refreshToken) {
  localStorage.setItem('mercuryAccessToken', accessToken);
  localStorage.setItem('mercuryRefreshToken', refreshToken);
}
function clearSession() {
  localStorage.removeItem('mercuryAccessToken');
  localStorage.removeItem('mercuryRefreshToken');
  localStorage.removeItem('mercuryPlayerId');
  localStorage.removeItem('mercuryPlayerName');
}

async function refreshSession() {
  const refreshToken = getRefreshToken();
  if (!refreshToken) return false;
  const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
    method: 'POST',
    headers: { apikey: SUPABASE_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ refresh_token: refreshToken })
  });
  if (!res.ok) return false;
  const data = await res.json();
  setSession(data.access_token, data.refresh_token);
  return true;
}

async function supabaseRequest(method, path, body, _isRetry) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method,
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${getAccessToken()}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (res.status === 401 && !_isRetry) {
    const refreshed = await refreshSession();
    if (refreshed) return supabaseRequest(method, path, body, true);
    clearSession();
    throw new Error('Session expired -- please log in again.');
  }
  if (!res.ok) throw new Error(`${method} ${path} failed: ${res.status} ${await res.text()}`);
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ===========================================================
// Sign up / Log in
// ===========================================================
document.getElementById('show-login-btn').addEventListener('click', () => {
  document.getElementById('login-form').style.display = 'block';
  document.getElementById('signup-form').style.display = 'none';
  document.getElementById('show-login-btn').classList.add('active');
  document.getElementById('show-signup-btn').classList.remove('active');
});
document.getElementById('show-signup-btn').addEventListener('click', () => {
  document.getElementById('login-form').style.display = 'none';
  document.getElementById('signup-form').style.display = 'block';
  document.getElementById('show-signup-btn').classList.add('active');
  document.getElementById('show-login-btn').classList.remove('active');
});

document.getElementById('signup-btn').addEventListener('click', async () => {
  const statusEl = document.getElementById('auth-status');
  statusEl.style.color = '#f88'; statusEl.textContent = 'Signing up...';
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('signup-email').value,
        password: document.getElementById('signup-password').value
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.msg || data.error_description || 'Sign up failed.');
    if (!data.access_token) {
      statusEl.style.color = '#5f5';
      statusEl.textContent = 'Account created. Check your email to confirm, then log in.';
      return;
    }
    setSession(data.access_token, data.refresh_token);
    showProfileForm(true);
  } catch (e) {
    statusEl.style.color = '#f88';
    statusEl.textContent = e.message;
  }
});

document.getElementById('login-btn').addEventListener('click', async () => {
  const statusEl = document.getElementById('auth-status');
  statusEl.style.color = '#f88'; statusEl.textContent = 'Logging in...';
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('login-email').value,
        password: document.getElementById('login-password').value
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.msg || data.error_description || 'Login failed.');
    setSession(data.access_token, data.refresh_token);
    showProfileForm(false);
  } catch (e) {
    statusEl.style.color = '#f88';
    statusEl.textContent = e.message;
  }
});

document.getElementById('logout-btn').addEventListener('click', () => {
  clearSession();
  window.location.reload();
});

// ===========================================================
// Profile form (shown once logged in)
// ===========================================================
let currentPlayerId = null;
let currentBagId = null;

function updateClubCountLabel() {
  const count = document.querySelectorAll('.club-row').length;
  document.getElementById('club-count-label').textContent = `${count} / 14 clubs`;
  document.getElementById('add-club-btn').disabled = count >= 14;
  document.getElementById('add-club-btn').style.opacity = count >= 14 ? '0.4' : '1';
}

function addClubRow(club) {
  club = club || {};
  const row = document.createElement('div');
  row.className = 'club-row mercury-card';
  row.dataset.clubId = club.club_id || '';
  row.innerHTML = `
    <button type="button" class="remove-btn">Remove</button>
    <label>Club type</label>
    <input class="club-type" placeholder="Driver, 7 Iron, Putter" value="${club.club_type || ''}">
    <label>Manufacturer</label>
    <input class="club-manufacturer" value="${club.manufacturer || ''}">
    <label>Model</label>
    <input class="club-model" value="${club.model || ''}">
    <label>Loft</label>
    <input class="club-loft" type="number" step="0.1" value="${club.loft ?? ''}">
    <label>Typical yardage</label>
    <input class="club-yardage" type="number" value="${club.typical_yardage ?? ''}">
    <label>Shaft model</label>
    <input class="club-shaft-model" value="${club.shaft_model || ''}">
    <label>Shaft flex</label>
    <input class="club-shaft-flex" value="${club.shaft_flex || ''}">
    <label>Notes</label>
    <textarea class="club-notes">${club.notes || ''}</textarea>
  `;
  row.querySelector('.remove-btn').addEventListener('click', async () => {
    if (row.dataset.clubId) {
      try { await supabaseRequest('DELETE', `clubs?club_id=eq.${row.dataset.clubId}`); }
      catch (e) { document.getElementById('status').textContent = 'Failed to remove: ' + e.message; return; }
    }
    row.remove();
    updateClubCountLabel();
  });
  document.getElementById('clubs-container').appendChild(row);
  updateClubCountLabel();
}

document.getElementById('add-club-btn').addEventListener('click', () => {
  if (document.querySelectorAll('.club-row').length >= 14) return;
  addClubRow();
});

async function loadHomeCourseOptions(selectedId) {
  const select = document.getElementById('home-course-select');
  try {
    const courses = await supabaseRequest('GET', 'courses?select=course_id,course_name&order=course_name');
    select.innerHTML = '<option value="">Not set</option>';
    courses.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.course_id; opt.textContent = c.course_name;
      select.appendChild(opt);
    });
    if (selectedId) select.value = selectedId;
  } catch (e) {
    select.innerHTML = '<option value="">Failed to load courses</option>';
  }
}

let allBags = [];

async function loadBagsList(selectBagId) {
  allBags = await supabaseRequest('GET', `bags?player_id=eq.${currentPlayerId}&select=*&order=created_at`);
  const select = document.getElementById('bag-select');
  select.innerHTML = '';
  allBags.forEach(b => {
    const opt = document.createElement('option');
    opt.value = b.bag_id;
    opt.textContent = b.name + (b.active ? ' (Active)' : '');
    select.appendChild(opt);
  });

  let toSelect = selectBagId;
  if (!toSelect) {
    const activeBag = allBags.find(b => b.active);
    toSelect = activeBag ? activeBag.bag_id : (allBags[0] ? allBags[0].bag_id : null);
  }
  if (toSelect) {
    select.value = toSelect;
    await loadBagClubs(toSelect);
  }
}

async function loadBagClubs(bagId) {
  currentBagId = bagId;
  document.getElementById('clubs-container').innerHTML = '';
  const bag = allBags.find(b => b.bag_id == bagId);
  document.getElementById('bag-active-status').textContent = bag && bag.active ? 'This is your active bag -- new rounds use it automatically.' : 'Not your active bag.';
  document.getElementById('set-active-btn').style.display = bag && bag.active ? 'none' : 'block';

  const clubs = await supabaseRequest('GET', `clubs?bag_id=eq.${bagId}&select=*`);
  clubs.forEach(addClubRow);
  updateClubCountLabel();
}

document.getElementById('bag-select').addEventListener('change', (e) => {
  loadBagClubs(e.target.value);
});

document.getElementById('new-bag-btn').addEventListener('click', async () => {
  const name = prompt('Name this bag (e.g. "Summer 2026", "New Scotty putter"):');
  if (!name) return;
  try {
    const created = await supabaseRequest('POST', 'bags', { player_id: currentPlayerId, name, active: false });
    await loadBagsList(created[0].bag_id);
  } catch (e) {
    document.getElementById('status').textContent = 'Failed to create bag: ' + e.message;
  }
});

document.getElementById('set-active-btn').addEventListener('click', async () => {
  try {
    const currentActive = allBags.find(b => b.active);
    if (currentActive) {
      await supabaseRequest('PATCH', `bags?bag_id=eq.${currentActive.bag_id}`, { active: false });
    }
    await supabaseRequest('PATCH', `bags?bag_id=eq.${currentBagId}`, { active: true });
    await loadBagsList(currentBagId);
  } catch (e) {
    document.getElementById('status').textContent = 'Failed to set active bag: ' + e.message;
  }
});

async function showProfileForm(isNewSignup) {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('profile-form').style.display = 'block';
  document.getElementById('status').textContent = '';
  document.getElementById('clubs-container').innerHTML = '';

  if (isNewSignup) {
    currentPlayerId = null; currentBagId = null; allBags = [];
    document.getElementById('name').value = '';
    document.getElementById('handedness').value = '';
    document.getElementById('age').value = '';
    document.getElementById('handicap').value = '';
    document.getElementById('game-notes').value = '';
    document.getElementById('bag-select').innerHTML = '<option>Save your profile first</option>';
    await loadHomeCourseOptions();
    return;
  }

  try {
    const players = await supabaseRequest('GET', 'players?select=*');
    if (players.length === 0) {
      currentPlayerId = null; currentBagId = null;
      return;
    }
    const player = players[0];
    currentPlayerId = player.player_id;
    localStorage.setItem('mercuryPlayerId', player.player_id);
    localStorage.setItem('mercuryPlayerName', player.name || '');
    document.getElementById('name').value = player.name || '';
    document.getElementById('handedness').value = player.handedness || '';
    document.getElementById('age').value = player.age ?? '';
    document.getElementById('handicap').value = player.handicap ?? '';
    document.getElementById('game-notes').value = player.game_notes || '';
    await loadHomeCourseOptions(player.home_course_id);
    await loadBagsList();
  } catch (e) {
    document.getElementById('status').textContent = 'Failed to load profile: ' + e.message;
  }
}

document.getElementById('save-btn').addEventListener('click', async () => {
  const statusEl = document.getElementById('status');
  statusEl.style.color = '#f88'; statusEl.textContent = 'Saving...';

  const playerData = {
    name: document.getElementById('name').value,
    handedness: document.getElementById('handedness').value || null,
    age: document.getElementById('age').value ? parseInt(document.getElementById('age').value) : null,
    handicap: document.getElementById('handicap').value ? parseFloat(document.getElementById('handicap').value) : null,
    home_course_id: document.getElementById('home-course-select').value || null,
    game_notes: document.getElementById('game-notes').value || null
  };

  try {
    let isBrandNewPlayer = false;
    if (!currentPlayerId) {
      isBrandNewPlayer = true;
      const meRes = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${getAccessToken()}` }
      });
      const me = await meRes.json();
      playerData.auth_user_id = me.id;
      const created = await supabaseRequest('POST', 'players', playerData);
      currentPlayerId = created[0].player_id;
    } else {
      await supabaseRequest('PATCH', `players?player_id=eq.${currentPlayerId}`, playerData);
    }

    await supabaseRequest('POST', 'player_history', {
      player_id: currentPlayerId,
      handicap: playerData.handicap,
      game_notes: playerData.game_notes
    });

    localStorage.setItem('mercuryPlayerId', currentPlayerId);
    localStorage.setItem('mercuryPlayerName', playerData.name);

    if (isBrandNewPlayer) {
      const createdBag = await supabaseRequest('POST', 'bags', { player_id: currentPlayerId, name: 'My Bag', active: true });
      currentBagId = createdBag[0].bag_id;
    }
    if (!currentBagId) {
      const createdBag = await supabaseRequest('POST', 'bags', { player_id: currentPlayerId, name: 'My Bag', active: true });
      currentBagId = createdBag[0].bag_id;
    }
    const rows = document.querySelectorAll('.club-row');
    for (const row of rows) {
      const clubData = {
        bag_id: currentBagId,
        club_type: row.querySelector('.club-type').value,
        manufacturer: row.querySelector('.club-manufacturer').value || null,
        model: row.querySelector('.club-model').value || null,
        loft: row.querySelector('.club-loft').value ? parseFloat(row.querySelector('.club-loft').value) : null,
        typical_yardage: row.querySelector('.club-yardage').value ? parseInt(row.querySelector('.club-yardage').value) : null,
        shaft_model: row.querySelector('.club-shaft-model').value || null,
        shaft_flex: row.querySelector('.club-shaft-flex').value || null,
        notes: row.querySelector('.club-notes').value || null
      };
      if (row.dataset.clubId) {
        await supabaseRequest('PATCH', `clubs?club_id=eq.${row.dataset.clubId}`, clubData);
      } else {
        const created = await supabaseRequest('POST', 'clubs', clubData);
        row.dataset.clubId = created[0].club_id;
      }
    }

    await loadBagsList(currentBagId);

    statusEl.style.color = '#5f5';
    statusEl.textContent = 'Saved.';
  } catch (e) {
    statusEl.style.color = '#f88';
    statusEl.textContent = 'Save failed: ' + e.message;
  }
});

// ===========================================================
// Entry point: already logged in, or show auth screen
// ===========================================================
if (getAccessToken()) {
  showProfileForm(false);
}
</script>
</body>
</html>
