<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mercury -- Profile</title>
<script>
  // ===================================================
  // CONFIG -- same values as index.html
  // ===================================================
  const SUPABASE_URL = "https://qzkhficwcpicglywmcid.supabase.co";
  const SUPABASE_KEY = "sb_publishable_t2IT_8t6w8cYP5aipFHWVQ_ESPnRjKG";
</script>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 480px; margin: 0 auto; padding: 16px; background: #111; color: #eee; }
  h1 { font-size: 20px; }
  h2 { font-size: 15px; color: #aaa; margin-top: 24px; }
  label { display: block; font-size: 13px; color: #aaa; margin-top: 10px; }
  input, select, textarea { width: 100%; box-sizing: border-box; padding: 8px; border-radius: 6px; border: 1px solid #444; background: #1c1c1c; color: #eee; margin-top: 4px; }
  textarea { min-height: 50px; font-family: inherit; }
  .club-row { border: 1px solid #333; border-radius: 8px; padding: 10px; margin-top: 12px; position: relative; }
  .club-row .remove-btn { position: absolute; top: 8px; right: 8px; background: #442222; color: #eee; border: none; border-radius: 6px; padding: 4px 8px; font-size: 12px; }
  #add-club-btn, #save-btn, #go-to-map-btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; margin-top: 16px; }
  #add-club-btn { background: #333; color: #eee; }
  #save-btn { background: #22cc55; color: white; }
  #go-to-map-btn { background: #3388ff; color: white; display: none; }
  .hint { font-size: 12px; color: #888; margin-top: 4px; }
  #status { font-size: 13px; color: #f88; margin-top: 10px; min-height: 16px; }
</style>
</head>
<body>

<a href="index.html" style="color:#3388ff; display:inline-block; margin-bottom:8px;">&larr; Map</a>
<h1>Mercury Golf -- Profile</h1>

<label>I am:</label>
<select id="player-picker">
  <option value="">Loading players...</option>
</select>

<div id="profile-form" style="display:none;">

  <h2>Personal info</h2>
  <label>Name</label>
  <input id="name" type="text">

  <label>Handedness</label>
  <select id="handedness">
    <option value="">Not specified</option>
    <option value="right">Right-handed</option>
    <option value="left">Left-handed</option>
  </select>

  <label>Age</label>
  <input id="age" type="number">

  <label>Handicap Index (if you have one)</label>
  <input id="handicap" type="number" step="0.1">

  <h2>Your bag</h2>
  <p class="hint">For each club, feel free to add notes: a typical miss (e.g. "tends left"), a confidence level, a real yardage, shaft details -- as much or as little as you want.</p>

  <div id="clubs-container"></div>
  <button id="add-club-btn" type="button">+ Add a club</button>

  <h2>Your game, generally</h2>
  <label>Anything else worth knowing -- strengths, weaknesses, tendencies</label>
  <textarea id="game-notes"></textarea>

  <button id="save-btn" type="button">Save profile</button>
  <div id="status"></div>

  <button id="go-to-map-btn" type="button">Go to map &rarr;</button>
</div>

<script>
let currentPlayerId = null;
let currentBagId = null;
let existingClubIds = []; // club_ids that already exist in the DB, so we know which rows are edits vs new

// ---------------------------------------------------------
// Supabase helpers
// ---------------------------------------------------------
async function supabaseRequest(method, path, body) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method,
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) throw new Error(`${method} ${path} failed: ${res.status} ${await res.text()}`);
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ---------------------------------------------------------
// Club row UI
// ---------------------------------------------------------
function addClubRow(club) {
  club = club || {};
  const row = document.createElement('div');
  row.className = 'club-row';
  row.dataset.clubId = club.club_id || '';
  row.innerHTML = `
    <button type="button" class="remove-btn">Remove</button>
    <label>Club type (e.g. Driver, 7 Iron, Putter)</label>
    <input class="club-type" value="${club.club_type || ''}">
    <label>Manufacturer</label>
    <input class="club-manufacturer" value="${club.manufacturer || ''}">
    <label>Model</label>
    <input class="club-model" value="${club.model || ''}">
    <label>Loft</label>
    <input class="club-loft" type="number" step="0.1" value="${club.loft ?? ''}">
    <label>Typical yardage (how far this club normally goes for you)</label>
    <input class="club-yardage" type="number" value="${club.typical_yardage ?? ''}">
    <label>Shaft model</label>
    <input class="club-shaft-model" value="${club.shaft_model || ''}">
    <label>Shaft flex</label>
    <input class="club-shaft-flex" value="${club.shaft_flex || ''}">
    <label>Notes</label>
    <textarea class="club-notes">${club.notes || ''}</textarea>
  `;
  row.querySelector('.remove-btn').addEventListener('click', async () => {
    if (row.dataset.clubId) {
      try {
        await supabaseRequest('DELETE', `clubs?club_id=eq.${row.dataset.clubId}`);
      } catch (e) {
        document.getElementById('status').textContent = 'Failed to remove club: ' + e.message;
        return;
      }
    }
    row.remove();
  });
  document.getElementById('clubs-container').appendChild(row);
}

document.getElementById('add-club-btn').addEventListener('click', () => addClubRow());

// ---------------------------------------------------------
// Load an existing player's full profile
// ---------------------------------------------------------
async function loadPlayer(playerId) {
  document.getElementById('clubs-container').innerHTML = '';
  document.getElementById('status').textContent = '';

  const players = await supabaseRequest('GET', `players?player_id=eq.${playerId}&select=*`);
  const player = players[0];
  currentPlayerId = player.player_id;

  document.getElementById('name').value = player.name || '';
  document.getElementById('handedness').value = player.handedness || '';
  document.getElementById('age').value = player.age ?? '';
  document.getElementById('handicap').value = player.handicap ?? '';
  document.getElementById('game-notes').value = player.game_notes || '';

  const bags = await supabaseRequest('GET', `bags?player_id=eq.${playerId}&select=bag_id&order=created_at`);
  if (bags.length > 0) {
    currentBagId = bags[0].bag_id;
    const clubs = await supabaseRequest('GET', `clubs?bag_id=eq.${currentBagId}&select=*`);
    clubs.forEach(addClubRow);
  } else {
    currentBagId = null;
  }

  document.getElementById('profile-form').style.display = 'block';
  document.getElementById('go-to-map-btn').style.display = 'block';
}

function startNewPlayer() {
  currentPlayerId = null;
  currentBagId = null;
  document.getElementById('name').value = '';
  document.getElementById('handedness').value = '';
  document.getElementById('age').value = '';
  document.getElementById('handicap').value = '';
  document.getElementById('game-notes').value = '';
  document.getElementById('clubs-container').innerHTML = '';
  document.getElementById('status').textContent = '';
  document.getElementById('profile-form').style.display = 'block';
  document.getElementById('go-to-map-btn').style.display = 'none';
}

// ---------------------------------------------------------
// Player picker
// ---------------------------------------------------------
const picker = document.getElementById('player-picker');

async function loadPlayerList() {
  try {
    const players = await supabaseRequest('GET', 'players?select=player_id,name&order=name');
    picker.innerHTML = '<option value="">Select your name</option>';
    players.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.player_id;
      opt.textContent = p.name;
      picker.appendChild(opt);
    });
    const newOpt = document.createElement('option');
    newOpt.value = 'new';
    newOpt.textContent = '+ New player';
    picker.appendChild(newOpt);
  } catch (e) {
    document.getElementById('status').textContent = 'Failed to load players: ' + e.message;
  }
}

picker.addEventListener('change', () => {
  if (picker.value === 'new') {
    startNewPlayer();
  } else if (picker.value) {
    loadPlayer(picker.value);
  } else {
    document.getElementById('profile-form').style.display = 'none';
  }
});

// ---------------------------------------------------------
// Save
// ---------------------------------------------------------
document.getElementById('save-btn').addEventListener('click', async () => {
  const statusEl = document.getElementById('status');
  statusEl.style.color = '#f88';
  statusEl.textContent = 'Saving...';

  const playerData = {
    name: document.getElementById('name').value,
    handedness: document.getElementById('handedness').value || null,
    age: document.getElementById('age').value ? parseInt(document.getElementById('age').value) : null,
    handicap: document.getElementById('handicap').value ? parseFloat(document.getElementById('handicap').value) : null,
    game_notes: document.getElementById('game-notes').value || null
  };

  try {
    if (!currentPlayerId) {
      const created = await supabaseRequest('POST', 'players', playerData);
      currentPlayerId = created[0].player_id;
    } else {
      await supabaseRequest('PATCH', `players?player_id=eq.${currentPlayerId}`, playerData);
    }

    if (!currentBagId) {
      const createdBag = await supabaseRequest('POST', 'bags', {
        player_id: currentPlayerId, name: 'My Bag', active: true
      });
      currentBagId = createdBag[0].bag_id;
    }

    const rows = document.querySelectorAll('.club-row');
    for (const row of rows) {
      const clubData = {
        bag_id: currentBagId,
        club_type: row.querySelector('.club-type').value,
        manufacturer: row.querySelector('.club-manufacturer').value || null,
        model: row.querySelector('.club-model').value || null,
        loft: row.querySelector('.club-loft').value ? parseFloat(row.querySelector('.club-loft').value) : null,
        typical_yardage: row.querySelector('.club-yardage').value ? parseInt(row.querySelector('.club-yardage').value) : null,
        shaft_model: row.querySelector('.club-shaft-model').value || null,
        shaft_flex: row.querySelector('.club-shaft-flex').value || null,
        notes: row.querySelector('.club-notes').value || null
      };
      if (row.dataset.clubId) {
        await supabaseRequest('PATCH', `clubs?club_id=eq.${row.dataset.clubId}`, clubData);
      } else {
        const created = await supabaseRequest('POST', 'clubs', clubData);
        row.dataset.clubId = created[0].club_id;
      }
    }

    statusEl.style.color = '#5f5';
    statusEl.textContent = 'Saved.';
    document.getElementById('go-to-map-btn').style.display = 'block';
    loadPlayerList(); // refresh in case a new player was just created
  } catch (e) {
    statusEl.style.color = '#f88';
    statusEl.textContent = 'Save failed: ' + e.message;
  }
});

document.getElementById('go-to-map-btn').addEventListener('click', () => {
  window.location.href = `index.html?player_id=${currentPlayerId}`;
});

loadPlayerList();
</script>
</body>
</html>
