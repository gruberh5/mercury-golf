<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mercury Golf</title>
<link rel="icon" type="image/svg+xml" href="logo/mercury-icon.svg">
<link rel="apple-touch-icon" href="logo/apple-touch-icon.png">
<link rel="stylesheet" href="mercury-theme.css">
<script>
  const SUPABASE_URL = "https://qzkhficwcpicglywmcid.supabase.co";
  const SUPABASE_KEY = "sb_publishable_t2IT_8t6w8cYP5aipFHWVQ_ESPnRjKG";
</script>
<style>
  body { padding: 24px 22px 100px; min-height: 100vh; }
  h1 { font-size: 26px; font-weight: 700; margin: 4px 0 2px; }
  .sub { color: var(--text-muted); font-size: 13px; margin-bottom: 22px; }
  .cta-card { margin-bottom: 18px; }
  .cta-card h2 { font-size: 16px; margin: 0 0 4px; }
  .cta-card p { font-size: 12.5px; color: var(--text-muted); margin: 0 0 14px; }
  .stat-tiles { display: flex; gap: 12px; margin-bottom: 22px; }
  .stat-tile { flex: 1; }
  .stat-tile .num { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .no-player { text-align: center; padding: 40px 20px; }
  .no-player a { color: var(--accent-soft); }
</style>
</head>
<body>

<div id="content">Loading...</div>

<div class="mercury-tabbar mercury-glass">
  <a href="index.html" class="mercury-tab active">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 8l7-5 7 5"/><path d="M5 8v8h10V8"/></svg>
    Home
  </a>
  <a href="stats.html" class="mercury-tab">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 16V9M10 16V4M16 16v-5"/></svg>
    Stats
  </a>
  <a href="map.html" class="mercury-tab-fab">
    <div class="fab-circle"><svg width="22" height="22" viewBox="0 0 22 22" fill="#0e1620"><path d="M7 4l11 7-11 7z"/></svg></div>
    <span>Play</span>
  </a>
  <a href="rounds.html" class="mercury-tab">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 5h12M4 10h12M4 15h12"/></svg>
    Rounds
  </a>
  <a href="profile.html" class="mercury-tab">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="10" cy="7" r="3.2"/><path d="M4 17c0-3.3 2.7-5 6-5s6 1.7 6 5"/></svg>
    Profile
  </a>
</div>

<script>
function getAccessToken() { return localStorage.getItem('mercuryAccessToken'); }
function getRefreshToken() { return localStorage.getItem('mercuryRefreshToken'); }
function setSession(accessToken, refreshToken) {
  localStorage.setItem('mercuryAccessToken', accessToken);
  localStorage.setItem('mercuryRefreshToken', refreshToken);
}
function clearSession() {
  localStorage.removeItem('mercuryAccessToken');
  localStorage.removeItem('mercuryRefreshToken');
  localStorage.removeItem('mercuryPlayerId');
  localStorage.removeItem('mercuryPlayerName');
}
async function refreshSession() {
  const refreshToken = getRefreshToken();
  if (!refreshToken) return false;
  const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
    method: 'POST',
    headers: { apikey: SUPABASE_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ refresh_token: refreshToken })
  });
  if (!res.ok) return false;
  const data = await res.json();
  setSession(data.access_token, data.refresh_token);
  return true;
}
async function supabaseRequest(method, path, body, _isRetry) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method,
    headers: {
      apikey: SUPABASE_KEY, Authorization: `Bearer ${getAccessToken()}`,
      'Content-Type': 'application/json', 'Prefer': 'return=representation'
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (res.status === 401 && !_isRetry) {
    const refreshed = await refreshSession();
    if (refreshed) return supabaseRequest(method, path, body, true);
    clearSession();
    throw new Error('Session expired -- please log in again.');
  }
  if (!res.ok) throw new Error(`Request failed: ${res.status}`);
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

function greetingWord() {
  const h = new Date().getHours();
  if (h < 12) return 'Good morning';
  if (h < 18) return 'Good afternoon';
  return 'Good evening';
}

async function render() {
  const content = document.getElementById('content');

  if (!getAccessToken()) {
    content.innerHTML = `
      <div class="no-player">
        <img src="logo/mercury-icon.svg" alt="" style="width:64px; height:64px; border-radius:50%; margin-bottom:16px;">
        <h1>Mercury Golf</h1>
        <p class="sub">Your course, your clubs, your caddie.</p>
        <p>Not logged in. <a href="profile.html">Log in or sign up</a> to get started.</p>
      </div>
    `;
    return;
  }

  try {
    const players = await supabaseRequest('GET', 'players?select=player_id,name,handicap');
    if (players.length === 0) {
      content.innerHTML = `
        <div class="no-player">
          <h1>Almost there</h1>
          <p>Your account exists, but you haven't finished your profile yet. <a href="profile.html">Finish setting it up</a>.</p>
        </div>
      `;
      return;
    }
    const player = players[0];
    const playerId = player.player_id;
    localStorage.setItem('mercuryPlayerId', playerId);
    localStorage.setItem('mercuryPlayerName', player.name);

    content.innerHTML = `
      <div style="display:flex; align-items:center; justify-content:space-between;">
        <div class="mercury-label" style="margin:0;">Mercury</div>
        <img src="logo/mercury-icon.svg" alt="" style="width:36px; height:36px; border-radius:50%;">
      </div>
      <h1>${greetingWord()}, ${player.name}</h1>
      <p class="sub">Loading your stats...</p>
    `;

    const rounds = await supabaseRequest('GET', `rounds?player_id=eq.${playerId}&select=round_id,tee_id,played_at&order=played_at.desc`);

    // Check whether the most recent round is unfinished (fewer hole_scores
    // than the course has holes) -- if so, offer to resume it directly
    // instead of only ever offering to start a brand new round.
    let resumeRoundId = null;
    if (rounds.length > 0) {
      const mostRecent = rounds[0];
      const scoresForMostRecent = await supabaseRequest('GET', `hole_scores?round_id=eq.${mostRecent.round_id}&select=hole_score_id`);
      const tee = (await supabaseRequest('GET', `tees?tee_id=eq.${mostRecent.tee_id}&select=course_id`))[0];
      const totalHoles = await supabaseRequest('GET', `holes?course_id=eq.${tee.course_id}&select=hole_id`);
      if (scoresForMostRecent.length < totalHoles.length) {
        resumeRoundId = mostRecent.round_id;
      }
    }

    let totalScore = 0, roundCount = rounds.length;
    const roundSummaries = [];

    for (const round of rounds.slice(0, 5)) {
      const holeScores = await supabaseRequest('GET', `hole_scores?round_id=eq.${round.round_id}&select=score`);
      const sum = holeScores.reduce((a, h) => a + (h.score || 0), 0);
      if (holeScores.length > 0) totalScore += sum;
      const tee = (await supabaseRequest('GET', `tees?tee_id=eq.${round.tee_id}&select=course_id`))[0];
      const course = (await supabaseRequest('GET', `courses?course_id=eq.${tee.course_id}&select=course_name`))[0];
      roundSummaries.push({ courseName: course.course_name, date: round.played_at, score: sum });
    }

    const validScores = roundSummaries.filter(r => r.score > 0);
    const avgScore = validScores.length > 0 ? Math.round(totalScore / validScores.length) : '--';

    let roundsHtml = roundSummaries.map(r => `
      <div class="mercury-card" style="margin-bottom:10px;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div>
            <div style="font-weight:700; font-size:14px;">${r.courseName}</div>
            <div style="font-size:11px; color:var(--text-muted); margin-top:2px;">${new Date(r.date).toLocaleDateString()}</div>
          </div>
          <div style="font-weight:700; font-size:22px;">${r.score || '--'}</div>
        </div>
      </div>
    `).join('');

    const ctaHtml = resumeRoundId
      ? `
        <div class="mercury-card cta-card">
          <h2>Round in progress</h2>
          <p>Pick up right where you left off.</p>
          <a href="map.html?round_id=${resumeRoundId}" class="mercury-btn-primary" style="display:block; text-align:center; text-decoration:none;">Resume round &rarr;</a>
        </div>
      `
      : `
        <div class="mercury-card cta-card">
          <h2>Tee it up</h2>
          <p>GPS yardages, shot tracking, and your caddie for all 18.</p>
          <a href="map.html" class="mercury-btn-primary" style="display:block; text-align:center; text-decoration:none;">Start a round &rarr;</a>
        </div>
      `;

    content.innerHTML = `
      <div style="display:flex; align-items:center; justify-content:space-between;">
        <div class="mercury-label" style="margin:0;">Mercury</div>
        <img src="logo/mercury-icon.svg" alt="" style="width:36px; height:36px; border-radius:50%;">
      </div>
      <h1>${greetingWord()}, ${player.name}</h1>
      <p class="sub">${new Date().toLocaleDateString(undefined, { weekday: 'long' })}</p>

      ${ctaHtml}

      <div class="stat-tiles">
        <div class="mercury-card stat-tile"><div class="num">${player.handicap ?? '--'}</div><div class="mercury-label">Handicap</div></div>
        <div class="mercury-card stat-tile"><div class="num">${roundCount}</div><div class="mercury-label">Rounds</div></div>
        <div class="mercury-card stat-tile"><div class="num">${avgScore}</div><div class="mercury-label">Avg score</div></div>
      </div>

      <div class="mercury-label" style="margin-bottom:10px;">Recent rounds</div>
      ${roundsHtml || '<p style="color:var(--text-muted); font-size:13px;">No rounds logged yet.</p>'}
    `;
  } catch (e) {
    content.innerHTML = `<p style="color:#f88;">Failed to load: ${e.message}</p>`;
  }
}

render();
</script>
</body>
</html>
