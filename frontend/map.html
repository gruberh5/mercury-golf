<style>

  #controls { position: absolute; top: 14px; left: 14px; right: 14px; z-index: 10; background: var(--panel); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); padding: 10px 14px; display: flex; gap: 10px; align-items: center; border-radius: 16px; box-shadow: 0 4px 14px rgba(0,0,0,.25); font-family: 'Archivo', sans-serif; }
  #back-arrow { color: var(--text); font-size: 22px; text-decoration: none; padding: 0 4px; }
  #hole-select { -webkit-appearance: none; appearance: none; background: rgba(255,255,255,.08); border: none; border-radius: 8px; color: var(--text); font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 20px; padding: 6px 10px; }
  .stat-col { text-align: center; padding: 0 6px; border-left: 1px solid rgba(255,255,255,.1); }
  .stat-col .num { font-weight: 700; font-size: 17px; font-variant-numeric: tabular-nums; }
  .stat-col .lbl { font-size: 8.5px; color: var(--text-faint); letter-spacing: .04em; text-transform: uppercase; }
  #view-toggle-btn { padding: 6px 12px; border-radius: 8px; border: none; background: var(--accent); color: var(--on-accent); font-weight: 700; font-size: 12px; }
  #club-select { -webkit-appearance: none; appearance: none; background: rgba(255,255,255,.08); border: none; border-radius: 8px; color: var(--text); font-family: 'Archivo', sans-serif; font-weight: 600; font-size: 12px; padding: 6px 8px; max-width: 110px; }
  #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
  #status { position: absolute; top: 68px; left: 10px; z-index: 10; color: white; font-size: 11px; background: rgba(20,24,29,.8); padding: 5px 9px; border-radius: 6px; }

  #bottom-bar { position: absolute; bottom: 16px; left: 16px; right: 16px; z-index: 10; display: flex; align-items: center; justify-content: center; gap: 10px; }
  #bottom-bar button { font-family: 'Archivo', sans-serif; border: none; }
  .center-group { display: flex; align-items: stretch; background: var(--accent); border-radius: 12px; overflow: hidden; }
  .center-group .nav-arrow { width: 44px; background: transparent; color: var(--on-accent); font-size: 20px; flex-shrink: 0; border-right: 1px solid rgba(0,0,0,.15); }
  .center-group .nav-arrow:last-child { border-right: none; border-left: 1px solid rgba(0,0,0,.15); }
  .center-group .nav-arrow:disabled { opacity: .35; }
  #open-score-btn { padding: 13px 20px; background: transparent; color: var(--on-accent); font-weight: 700; font-size: 14px; white-space: nowrap; flex-shrink: 0; }
  #open-score-btn.saved { color: var(--on-accent); opacity: .85; }
  .side-icon-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); color: var(--on-accent); font-size: 18px; flex-shrink: 0; }

  #score-sheet-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 40; display: none; }
  #score-sheet { position: fixed; left: 0; right: 0; bottom: 0; z-index: 41; background: #22272e; border-radius: 20px 20px 0 0; padding: 18px 18px 24px; box-sizing: border-box; transform: translateY(100%); transition: transform .22s ease-out; font-family: 'Archivo', sans-serif; max-height: 80vh; overflow-y: auto; }
  #score-sheet.open { transform: translateY(0); }
  #score-sheet-backdrop.open { display: block; }
  #score-sheet h3 { font-size: 15px; font-weight: 700; margin: 0 0 14px; display: flex; justify-content: space-between; align-items: center; }
  #score-sheet .close-x { color: var(--text-faint); font-size: 20px; line-height: 1; }
  #score-sheet .picker-label { font-size: 10px; letter-spacing: .05em; text-transform: uppercase; color: var(--text-faint); margin: 14px 0 8px; }
  #score-sheet .chip-row { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
  #score-sheet .chip-row::-webkit-scrollbar { display: none; }
  #score-chip-row .chip { flex: 0 0 54px; }
  #putts-chip-row .chip { flex: 1; }
  .dir-picker { display: grid; grid-template-columns: repeat(3, 56px); grid-template-rows: repeat(3, 56px); gap: 8px; justify-content: center; margin: 4px auto 0; }
  .dir-picker .icon-chip { width: 56px; height: 56px; border-radius: 50%; padding: 0; }
  .dir-slot-up { grid-column: 2; grid-row: 1; }
  .dir-slot-left { grid-column: 1; grid-row: 2; }
  .dir-slot-hit { grid-column: 2; grid-row: 2; }
  .dir-slot-right { grid-column: 3; grid-row: 2; }
  .dir-slot-down { grid-column: 2; grid-row: 3; }
  .chip { flex: 1; min-width: 40px; padding: 10px 0; border-radius: 10px; border: 1px solid var(--card-border); background: rgba(255,255,255,.05); color: var(--text); text-align: center; font-weight: 700; font-family: 'Archivo', sans-serif; display: flex; align-items: center; justify-content: center; }
  .chip.selected { background: var(--accent); border-color: var(--accent); color: var(--on-accent); }
  .score-ring { display: inline-flex; align-items: center; justify-content: center; }
  .score-ring.circle { border-radius: 50%; border: 1.6px solid currentColor; padding: 2px; }
  .score-ring.square { border-radius: 3px; border: 1.6px solid currentColor; padding: 2px; }
  .score-num { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; font-size: 16px; font-weight: 700; }
  .icon-chip { flex: 1; padding: 12px 0; border-radius: 10px; border: 1px solid var(--card-border); background: rgba(255,255,255,.05); color: var(--text); font-size: 18px; text-align: center; display: flex; align-items: center; justify-content: center; }
  .icon-chip.selected { background: var(--accent); border-color: var(--accent); color: var(--on-accent); }
  #scorecard-sheet { position: fixed; left: 0; right: 0; bottom: 0; z-index: 41; background: #22272e; border-radius: 20px 20px 0 0; padding: 18px 18px 24px; box-sizing: border-box; transform: translateY(100%); transition: transform .22s ease-out; font-family: 'Archivo', sans-serif; max-height: 75vh; overflow-y: auto; }
  #scorecard-sheet.open { transform: translateY(0); }
  #breakdown-sheet { position: fixed; left: 0; right: 0; bottom: 0; z-index: 41; background: #22272e; border-radius: 20px 20px 0 0; padding: 18px 18px 24px; box-sizing: border-box; transform: translateY(100%); transition: transform .22s ease-out; font-family: 'Archivo', sans-serif; max-height: 75vh; overflow-y: auto; }
  #breakdown-sheet.open { transform: translateY(0); }
  #breakdown-sheet h3 { display: flex; justify-content: space-between; align-items: center; font-size: 15px; margin: 0 0 14px; }

  .scorecard-table th { font-size: 10px; color: var(--text-faint); font-weight: 600; text-transform: uppercase; }
  .scorecard-table .sc-label-col { position: sticky; left: 0; background: #22272e; text-align: left; font-weight: 700; z-index: 1; }
  .scorecard-table .sc-total-col { font-weight: 700; border-left: 1px solid rgba(255,255,255,.15); }
  #save-score-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--accent); color: var(--on-accent); font-weight: 700; margin-top: 18px; }
  #score-status { font-size: 11px; text-align: center; margin-top: 8px; min-height: 14px; }

<body>

<div id="setup-screen">

<script>
const urlParams = new URLSearchParams(window.location.search);
let playerId = null;
let roundId = urlParams.get('round_id');

function getAccessToken() { return localStorage.getItem('mercuryAccessToken'); }
function getRefreshToken() { return localStorage.getItem('mercuryRefreshToken'); }
function setSession(accessToken, refreshToken) {
  localStorage.setItem('mercuryAccessToken', accessToken);
  localStorage.setItem('mercuryRefreshToken', refreshToken);
}
function clearSession() {
  localStorage.removeItem('mercuryAccessToken');
  localStorage.removeItem('mercuryRefreshToken');
  localStorage.removeItem('mercuryPlayerId');
  localStorage.removeItem('mercuryPlayerName');
}
async function refreshSession() {
  const refreshToken = getRefreshToken();
  if (!refreshToken) return false;
  const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
    method: 'POST',
    headers: { apikey: SUPABASE_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ refresh_token: refreshToken })
  });
  if (!res.ok) return false;
  const data = await res.json();
  setSession(data.access_token, data.refresh_token);
  return true;
}

async function supabaseRequest(method, path, body, _isRetry) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method,
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${getAccessToken()}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
    body: body ? JSON.stringify(body) : undefined
  });
  if (res.status === 401 && !_isRetry) {
    const refreshed = await refreshSession();
    if (refreshed) return supabaseRequest(method, path, body, true);
    clearSession();
    throw new Error('Session expired -- please log in again.');
  }
  if (!res.ok) throw new Error(`${method} ${path} failed: ${res.status} ${await res.text()}`);
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function resolveCurrentPlayer() {
  if (!getAccessToken()) return null;
  const players = await supabaseRequest('GET', 'players?select=player_id');
  if (players.length === 0) return null;
  return players[0].player_id;
}

const setupCourseSelect = document.getElementById('setup-course-select');
const setupTeeSelect = document.getElementById('setup-tee-select');
const startRoundBtn = document.getElementById('start-round-btn');
const setupStatus = document.getElementById('setup-status');

async function initSetupScreen() {
  try {
    playerId = await resolveCurrentPlayer();
  } catch (e) {
    setupStatus.textContent = 'Failed to resolve your account: ' + e.message;
    return;
  }
  if (!playerId) {
    document.getElementById('no-player-warning').style.display = 'block';
    document.getElementById('setup-fields').style.display = 'none';
    return;
  }
  try {
    const courses = await supabaseRequest('GET', 'courses?select=course_id,course_name&order=course_name');
    setupCourseSelect.innerHTML = '<option value="">Select a course</option>';
    courses.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.course_id; opt.textContent = c.course_name;
      setupCourseSelect.appendChild(opt);
    });
  } catch (e) { setupStatus.textContent = 'Failed to load courses: ' + e.message; }
}

setupCourseSelect.addEventListener('change', async () => {
  const courseId = setupCourseSelect.value;
  setupTeeSelect.disabled = true; startRoundBtn.disabled = true;
  if (!courseId) return;
  setupTeeSelect.innerHTML = '<option value="">Loading tees...</option>';
  try {
    const tees = await supabaseRequest('GET', `tees?course_id=eq.${courseId}&select=tee_id,tee_name,gender&order=tee_name`);
    setupTeeSelect.innerHTML = '<option value="">Select a tee</option>';
    tees.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t.tee_id; opt.textContent = `${t.tee_name} (${t.gender})`;
      setupTeeSelect.appendChild(opt);
    });
    setupTeeSelect.disabled = false;
  } catch (e) { setupStatus.textContent = 'Failed to load tees: ' + e.message; }
});

setupTeeSelect.addEventListener('change', () => { startRoundBtn.disabled = !setupTeeSelect.value; });

startRoundBtn.addEventListener('click', async () => {
  setupStatus.style.color = '#f88'; setupStatus.textContent = 'Starting round...';
  try {
    const bags = await supabaseRequest('GET', `bags?player_id=eq.${playerId}&active=eq.true&select=bag_id`);
    if (bags.length === 0) { setupStatus.textContent = 'No active bag set -- go mark one active in your profile first.'; return; }
    const bagId = bags[0].bag_id;
    const created = await supabaseRequest('POST', 'rounds', {
      player_id: playerId, bag_id: bagId, tee_id: setupTeeSelect.value, played_at: new Date().toISOString()
    });
    roundId = created[0].round_id;
    lockedTeeId = setupTeeSelect.value;
    history.replaceState(null, '', `map.html?round_id=${roundId}`);
    enterRoundScreen(setupCourseSelect.value, setupCourseSelect.selectedOptions[0].textContent);
  } catch (e) { setupStatus.textContent = 'Failed to start round: ' + e.message; }
});

let map = null, greenMarker = null, playerMarker = null, targetMarker = null, currentGreen = null, currentHoleId = null;
let lastPlayerPos = null, lastFlownPos = null, viewMode = 'hole', cachedElevDiffYards = null, lastElevFetchTime = 0;
let currentTarget = null, userMovedTarget = false, currentGreenBoundary = null;
let bagClubs = [], selectedClubYardage = null;

function haversineMeters(lat1, lon1, lat2, lon2) {
  const R = 6371000, toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}
function metersToYards(m) { return m * 1.09361; }
function bearingDegrees(lat1, lon1, lat2, lon2) {
  const toRad = d => d * Math.PI / 180, toDeg = r => r * 180 / Math.PI;
  const dLon = toRad(lon2 - lon1);
  const y = Math.sin(dLon) * Math.cos(toRad(lat2));
  const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) - Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLon);
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

function destinationPoint(lat, lon, bearingDeg, distanceMeters) {
  const R = 6371000;
  const delta = distanceMeters / R;
  const theta = bearingDeg * Math.PI / 180;
  const phi1 = lat * Math.PI / 180, lambda1 = lon * Math.PI / 180;
  const phi2 = Math.asin(Math.sin(phi1) * Math.cos(delta) + Math.cos(phi1) * Math.sin(delta) * Math.cos(theta));
  const lambda2 = lambda1 + Math.atan2(Math.sin(theta) * Math.sin(delta) * Math.cos(phi1), Math.cos(delta) - Math.sin(phi1) * Math.sin(phi2));
  return { lat: phi2 * 180 / Math.PI, lon: lambda2 * 180 / Math.PI };
}

function segmentIntersect(p1, p2, p3, p4) {
  const d1x = p2.x - p1.x, d1y = p2.y - p1.y;
  const d2x = p4.x - p3.x, d2y = p4.y - p3.y;
  const denom = d1x * d2y - d1y * d2x;
  if (Math.abs(denom) < 1e-9) return null;
  const t = ((p3.x - p1.x) * d2y - (p3.y - p1.y) * d2x) / denom;
  const u = ((p3.x - p1.x) * d1y - (p3.y - p1.y) * d1x) / denom;
  if (t < 0 || t > 1 || u < 0 || u > 1) return null;
  return { x: p1.x + t * d1x, y: p1.y + t * d1y };
}

function computeFrontMiddleBackYards(playerLat, playerLon, greenLat, greenLon, ringLonLat) {
  if (!ringLonLat || ringLonLat.length < 3) return null;

  const cosLat0 = Math.cos(greenLat * Math.PI / 180);
  const R = 6371000;
  const toXY = (lat, lon) => ({
    x: (lon - greenLon) * Math.PI / 180 * R * cosLat0,
    y: (lat - greenLat) * Math.PI / 180 * R,
  });

  const playerXY = toXY(playerLat, playerLon);
  const greenXY = { x: 0, y: 0 };
  const dx = greenXY.x - playerXY.x, dy = greenXY.y - playerXY.y;
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len < 1) return null;
  const ext = 100; // extend well past the green so the ray fully crosses it
  const farPoint = { x: playerXY.x + (dx / len) * (len + ext), y: playerXY.y + (dy / len) * (len + ext) };

  const ring = ringLonLat.map(([lon, lat]) => toXY(lat, lon));
  const intersections = [];
  for (let i = 0; i < ring.length - 1; i++) {
    const inter = segmentIntersect(playerXY, farPoint, ring[i], ring[i + 1]);
    if (inter) intersections.push(inter);
  }
  if (intersections.length === 0) return null;

  const dists = intersections.map(p => Math.sqrt((p.x - playerXY.x) ** 2 + (p.y - playerXY.y) ** 2));
  const toLatLon = (xy) => ({
    lat: greenLat + xy.y / (Math.PI / 180 * R),
    lon: greenLon + xy.x / (Math.PI / 180 * R * cosLat0),
  });
  const frontIdx = dists.indexOf(Math.min(...dists));
  const backIdx = dists.indexOf(Math.max(...dists));
  return {
    front: metersToYards(dists[frontIdx]),
    middle: metersToYards(len),
    back: metersToYards(dists[backIdx]),
    frontPoint: toLatLon(intersections[frontIdx]),
    backPoint: toLatLon(intersections[backIdx]),
  };
}

async function fetchElevationDiffYards(playerLat, playerLon, greenLat, greenLon) {
  try {
    const url = `https://api.open-elevation.com/api/v1/lookup?locations=${playerLat},${playerLon}|${greenLat},${greenLon}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('Open-Elevation request failed');
    const data = await res.json();
    return metersToYards(data.results[1].elevation - data.results[0].elevation);
  } catch (e) { document.getElementById('status').textContent = 'Elevation lookup failed: ' + e.message; return null; }
}

function computeSmartDefaultTarget() {
  if (!currentGreen) return null;
  if (!lastPlayerPos) { isLockedToGreenCenter = true; return { lat: currentGreen.lat, lon: currentGreen.lon }; }

  const distToGreenMeters = haversineMeters(lastPlayerPos.lat, lastPlayerPos.lon, currentGreen.lat, currentGreen.lon);
  const CLOSE_THRESHOLD_METERS = 230; // roughly 250 yards

  if (currentPar === 3 || distToGreenMeters <= CLOSE_THRESHOLD_METERS || !selectedClubYardage) {
    isLockedToGreenCenter = true;
    return { lat: currentGreen.lat, lon: currentGreen.lon };
  }

  isLockedToGreenCenter = false;
  const bearing = bearingDegrees(lastPlayerPos.lat, lastPlayerPos.lon, currentGreen.lat, currentGreen.lon);
  const clubDistanceMeters = selectedClubYardage / 1.09361;
  return destinationPoint(lastPlayerPos.lat, lastPlayerPos.lon, bearing, clubDistanceMeters);
}

let isLockedToGreenCenter = false;

function ensureTargetMarker() {
  if (!currentTarget || !map) return;
  if (!targetMarker) {
    const el = document.createElement('div');
    el.style.width = '44px'; el.style.height = '44px'; el.style.position = 'relative';
    el.innerHTML = `
      <div id="target-label" style="position:absolute; right:100%; top:50%; transform:translateY(-50%); margin-right:8px; background:rgba(20,24,29,.85); color:white; padding:3px 9px; border-radius:8px; white-space:nowrap; font-family:'Archivo',sans-serif; text-align:center;">
        <div id="target-label-raw" style="font-weight:700; font-size:14px; line-height:1.2;">--y</div>
        <div id="target-label-adjusted" style="font-size:10px; color:#ffb877; line-height:1.2;"></div>
      </div>
      <svg width="44" height="44" viewBox="0 0 32 32">
        <circle cx="16" cy="16" r="13" fill="none" stroke="#ffffff" stroke-width="2"/>
        <line x1="16" y1="2" x2="16" y2="9" stroke="#ffffff" stroke-width="2"/>
        <line x1="16" y1="23" x2="16" y2="30" stroke="#ffffff" stroke-width="2"/>
        <line x1="2" y1="16" x2="9" y2="16" stroke="#ffffff" stroke-width="2"/>
        <line x1="23" y1="16" x2="30" y2="16" stroke="#ffffff" stroke-width="2"/>
        <circle id="target-center-dot" cx="16" cy="16" r="2.5" fill="#ffffff"/>
      </svg>
    `;
    targetMarker = new mapboxgl.Marker({ element: el, draggable: true, anchor: 'center' })
      .setLngLat([currentTarget.lon, currentTarget.lat]).addTo(map);

    targetMarker.on('drag', () => {
      const ll = targetMarker.getLngLat();
      let lat = ll.lat, lon = ll.lng;

      const SNAP_RADIUS_METERS = 4; // roughly 13 feet
      const distToGreenCenter = currentGreen ? haversineMeters(lat, lon, currentGreen.lat, currentGreen.lon) : Infinity;
      if (distToGreenCenter <= SNAP_RADIUS_METERS) {
        lat = currentGreen.lat; lon = currentGreen.lon;
        targetMarker.setLngLat([lon, lat]);
        isLockedToGreenCenter = true;
      } else {
        isLockedToGreenCenter = false;
      }
      document.getElementById('target-center-dot').setAttribute('r', isLockedToGreenCenter ? '4.5' : '2.5');

      updateShotLine({ lat, lon });
      if (lastPlayerPos) {
        const liveYards = metersToYards(haversineMeters(lastPlayerPos.lat, lastPlayerPos.lon, lat, lon));
        document.getElementById('target-label-raw').textContent = Math.round(liveYards) + 'y';
        document.getElementById('target-label-adjusted').textContent = '';
      }
      updateFrontMiddleBackDisplay();
      updateLayupLine({ lat, lon });
    });

    targetMarker.on('dragend', () => {
      const ll = targetMarker.getLngLat();
      currentTarget = { lat: ll.lat, lon: ll.lng };
      userMovedTarget = true;
      updateDistanceDisplay();
    });
  } else {
    targetMarker.setLngLat([currentTarget.lon, currentTarget.lat]);
  }
  updateShotLine(currentTarget);
}

function updateShotLine(targetPos) {
  if (!map || !lastPlayerPos || !targetPos) return;
  const geojson = {
    type: 'Feature',
    geometry: { type: 'LineString', coordinates: [[lastPlayerPos.lon, lastPlayerPos.lat], [targetPos.lon, targetPos.lat]] }
  };
  const source = map.getSource('shot-line');
  if (source) source.setData(geojson);
}

let frontMarker = null, backMarker = null;

function updateFrontMiddleBackDisplay() {
  if (!isLockedToGreenCenter || !currentGreenBoundary || !lastPlayerPos || !currentGreen) {
    if (frontMarker) { frontMarker.remove(); frontMarker = null; }
    if (backMarker) { backMarker.remove(); backMarker = null; }
    return;
  }
  const fmb = computeFrontMiddleBackYards(lastPlayerPos.lat, lastPlayerPos.lon, currentGreen.lat, currentGreen.lon, currentGreenBoundary);
  if (!fmb) {
    if (frontMarker) { frontMarker.remove(); frontMarker = null; }
    if (backMarker) { backMarker.remove(); backMarker = null; }
    return;
  }

  const bubbleStyle = 'background:rgba(20,24,29,.85); color:white; padding:4px 12px; border-radius:20px; text-align:center; font-family:"Archivo",sans-serif; white-space:nowrap;';

  if (!frontMarker) {
    const el = document.createElement('div');
    el.id = 'front-bubble'; el.style.cssText = bubbleStyle;
    frontMarker = new mapboxgl.Marker({ element: el, anchor: 'center' }).setLngLat([fmb.frontPoint.lon, fmb.frontPoint.lat]).addTo(map);
  } else {
    frontMarker.setLngLat([fmb.frontPoint.lon, fmb.frontPoint.lat]);
  }
  document.getElementById('front-bubble').innerHTML = `<div style="font-weight:700; font-size:14px;">${Math.round(fmb.front)}y</div><div style="font-size:9px; color:#ffb877;">Front</div>`;

  if (!backMarker) {
    const el = document.createElement('div');
    el.id = 'back-bubble'; el.style.cssText = bubbleStyle;
    backMarker = new mapboxgl.Marker({ element: el, anchor: 'center' }).setLngLat([fmb.backPoint.lon, fmb.backPoint.lat]).addTo(map);
  } else {
    backMarker.setLngLat([fmb.backPoint.lon, fmb.backPoint.lat]);
  }
  document.getElementById('back-bubble').innerHTML = `<div style="font-weight:700; font-size:14px;">${Math.round(fmb.back)}y</div><div style="font-size:9px; color:#ffb877;">Back</div>`;
}

let lastRawYards = null, lastElevDiffYards = null;

async function updateDistanceDisplay() {
  if (!currentTarget || !lastPlayerPos) return;
  ensureTargetMarker();

  const rawMeters = haversineMeters(lastPlayerPos.lat, lastPlayerPos.lon, currentTarget.lat, currentTarget.lon);
  const rawYards = metersToYards(rawMeters);
  lastRawYards = rawYards;
  document.getElementById('target-label-raw').textContent = Math.round(rawYards) + 'y';

  const now = Date.now();
  if (cachedElevDiffYards === null || now - lastElevFetchTime > 30000) {
    lastElevFetchTime = now;
    cachedElevDiffYards = await fetchElevationDiffYards(lastPlayerPos.lat, lastPlayerPos.lon, currentTarget.lat, currentTarget.lon);
  }
  lastElevDiffYards = cachedElevDiffYards;
  const adjustedEl = document.getElementById('target-label-adjusted');
  if (cachedElevDiffYards != null) {
    const adjustedYards = rawYards + cachedElevDiffYards;
    adjustedEl.textContent = `${Math.round(adjustedYards)}y adjusted`;
    adjustedEl.style.cursor = 'pointer';
    adjustedEl.style.textDecoration = 'underline';
    adjustedEl.onclick = (e) => { e.stopPropagation(); openAdjustedBreakdown(); };
  } else { adjustedEl.textContent = ''; adjustedEl.onclick = null; }

  updateFrontMiddleBackDisplay();
  updateLayupLine();
}

let layupBubble = null;

function updateLayupLine(overridePoint) {
  const source = map ? map.getSource('layup-line') : null;
  if (!source) return;
  const point = overridePoint || currentTarget;

  if (isLockedToGreenCenter || !currentGreen || !point) {
    source.setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: [] } });
    if (layupBubble) { layupBubble.remove(); layupBubble = null; }
    return;
  }

  source.setData({
    type: 'Feature',
    geometry: { type: 'LineString', coordinates: [[point.lon, point.lat], [currentGreen.lon, currentGreen.lat]] }
  });

  const remainingYards = metersToYards(haversineMeters(point.lat, point.lon, currentGreen.lat, currentGreen.lon));
  const midLat = (point.lat + currentGreen.lat) / 2;
  const midLon = (point.lon + currentGreen.lon) / 2;

  if (!layupBubble) {
    const el = document.createElement('div');
    el.id = 'layup-bubble';
    el.style.cssText = 'background:rgba(20,24,29,.85); color:#ffb877; padding:4px 12px; border-radius:20px; text-align:center; font-family:"Archivo",sans-serif; white-space:nowrap;';
    layupBubble = new mapboxgl.Marker({ element: el, anchor: 'center' }).setLngLat([midLon, midLat]).addTo(map);
  } else {
    layupBubble.setLngLat([midLon, midLat]);
  }
  document.getElementById('layup-bubble').innerHTML = `<div style="font-weight:700; font-size:14px;">${Math.round(remainingYards)}y</div><div style="font-size:9px;">left to green</div>`;
}

function openAdjustedBreakdown() {
  if (lastRawYards == null) return;
  const adjustedYards = lastRawYards + (lastElevDiffYards || 0);
  const direction = lastElevDiffYards > 1 ? 'uphill' : lastElevDiffYards < -1 ? 'downhill' : 'flat';
  document.getElementById('breakdown-content').innerHTML = `
    <div class="scorecard-row"><span>Raw distance</span><span class="sc-score">${Math.round(lastRawYards)}y</span></div>
    <div class="scorecard-row"><span>Elevation change</span><span class="sc-score">${lastElevDiffYards > 0 ? '+' : ''}${Math.round(lastElevDiffYards || 0)}y (${direction})</span></div>
    <div class="scorecard-row total"><span>Adjusted distance</span><span class="sc-score">${Math.round(adjustedYards)}y</span></div>
  `;
  document.getElementById('breakdown-sheet').classList.add('open');
  document.getElementById('score-sheet-backdrop').classList.add('open');
}

function updateMapView(force) {
  if (!currentGreen || !lastPlayerPos || !map) return;
  if (!force && lastFlownPos) {
    const movedMeters = haversineMeters(lastPlayerPos.lat, lastPlayerPos.lon, lastFlownPos.lat, lastFlownPos.lon);
    if (movedMeters < 15) return;
  }
  const bearing = bearingDegrees(lastPlayerPos.lat, lastPlayerPos.lon, currentGreen.lat, currentGreen.lon);
  if (viewMode === 'approach') {
    map.easeTo({ center: [currentGreen.lon, currentGreen.lat], zoom: 19, bearing, duration: 1000 });
  } else {
    const bounds = new mapboxgl.LngLatBounds().extend([lastPlayerPos.lon, lastPlayerPos.lat]).extend([currentGreen.lon, currentGreen.lat]);
    map.fitBounds(bounds, { padding: 80, bearing, duration: 1000, maxZoom: 18 });
  }
  lastFlownPos = { ...lastPlayerPos };
}

document.getElementById('view-toggle-btn').addEventListener('click', () => {
  viewMode = viewMode === 'hole' ? 'approach' : 'hole';
  document.getElementById('view-toggle-btn').textContent = viewMode === 'hole' ? 'Approach View' : 'Hole View';
  updateMapView(true);
});

function onPosition(position) {
  lastPlayerPos = { lat: position.coords.latitude, lon: position.coords.longitude };
  if (!map) return;
  if (!playerMarker) playerMarker = new mapboxgl.Marker({ color: '#5f9fd4' }).setLngLat([lastPlayerPos.lon, lastPlayerPos.lat]).addTo(map);
  else playerMarker.setLngLat([lastPlayerPos.lon, lastPlayerPos.lat]);

  if (!userMovedTarget) {
    currentTarget = computeSmartDefaultTarget();
  }
  updateShotLine(currentTarget);
  updateDistanceDisplay();
  updateMapView(false);
}
function onPositionError(err) { document.getElementById('status').textContent = 'GPS error: ' + err.message; }
if (navigator.geolocation) navigator.geolocation.watchPosition(onPosition, onPositionError, { enableHighAccuracy: true, maximumAge: 1000 });

const holeSelect = document.getElementById('hole-select');
let lockedCourseId = null;

async function loadHolesForLockedCourse() {
  const holes = await supabaseRequest('GET', `holes?course_id=eq.${lockedCourseId}&select=hole_id,hole_number,par,green_lat,green_lon,green_boundary&order=hole_number`);
  holeOrder = holes;
  holeSelect.innerHTML = '';
  holes.forEach(h => {
    const opt = document.createElement('option');
    opt.value = h.hole_id; opt.textContent = h.hole_number;
    opt.dataset.lat = h.green_lat; opt.dataset.lon = h.green_lon; opt.dataset.par = h.par; opt.dataset.holeNumber = h.hole_number;
    holeSelect.appendChild(opt);
  });
  if (holes.length > 0) selectHoleByIndex(0);
}

let holeOrder = [];
let currentHoleIndex = 0;

function selectHoleByIndex(i) {
  if (i < 0 || i >= holeOrder.length) return;
  currentHoleIndex = i;
  const h = holeOrder[i];
  selectHole(h.hole_id, h.green_lat, h.green_lon, h.par, h.hole_number, h.green_boundary);
  document.getElementById('prev-hole-btn').disabled = i === 0;
  document.getElementById('next-hole-btn').disabled = i === holeOrder.length - 1;
}

document.getElementById('prev-hole-btn').addEventListener('click', () => selectHoleByIndex(currentHoleIndex - 1));
document.getElementById('next-hole-btn').addEventListener('click', () => selectHoleByIndex(currentHoleIndex + 1));

let currentPar = null, currentHoleNumber = null, lockedTeeId = null;

function selectHole(holeId, lat, lon, par, holeNumber, greenBoundary) {
  currentPar = parseInt(par);
  currentHoleNumber = holeNumber;
  document.getElementById('stat-par').textContent = currentPar;
  document.getElementById('stat-yds').textContent = '--';
  document.getElementById('stat-hcp').textContent = '--';
  supabaseRequest('GET', `tee_holes?tee_id=eq.${lockedTeeId}&hole_id=eq.${holeId}&select=yardage,handicap_index`).then(rows => {
    if (rows.length > 0) {
      document.getElementById('stat-yds').textContent = rows[0].yardage;
      document.getElementById('stat-hcp').textContent = rows[0].handicap_index;
    }
  });
  currentHoleId = holeId;
  currentGreen = { lat: parseFloat(lat), lon: parseFloat(lon) };
  currentGreenBoundary = greenBoundary || null;
  cachedElevDiffYards = null;
  holeSelect.value = holeId;
  if (!greenMarker) {
    const dotEl = document.createElement('div');
    dotEl.style.width = '14px'; dotEl.style.height = '14px'; dotEl.style.borderRadius = '50%';
    dotEl.style.background = 'rgba(255,255,255,.55)'; dotEl.style.border = '2px solid rgba(255,255,255,.85)';
    greenMarker = new mapboxgl.Marker({ element: dotEl, anchor: 'center' }).setLngLat([currentGreen.lon, currentGreen.lat]).addTo(map);
  }
  else greenMarker.setLngLat([currentGreen.lon, currentGreen.lat]);

  userMovedTarget = false;
  currentTarget = computeSmartDefaultTarget();
  ensureTargetMarker();

  updateDistanceDisplay();
  updateMapView(true);
  loadExistingHoleScore();
}

holeSelect.addEventListener('change', () => {
  const idx = holeOrder.findIndex(h => String(h.hole_id) === holeSelect.value);
  if (idx !== -1) selectHoleByIndex(idx);
});

let currentHoleScoreId = null;
let selectedScore = null, selectedPutts = null, selectedFairway = null, selectedGreen = null;

function selectChip(row, value, isFairwayGreen) {
  row.querySelectorAll('.chip, .icon-chip').forEach(el => {
    const match = isFairwayGreen ? el.dataset.value === value : parseInt(el.dataset.value) === value;
    el.classList.toggle('selected', match);
  });
}

function buildScoreChips(par) {
  const row = document.getElementById('score-chip-row');
  row.innerHTML = '';
  const offsets = [-3, -2, -1, 0, 1, 2, 3, 4];
  offsets.forEach(off => {
    const score = par + off;
    if (score < 1) return;
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.dataset.value = score;

    let inner = `<span class="score-num">${score}</span>`;
    if (off < 0) {
      const rings = Math.min(Math.abs(off), 3);
      for (let i = 0; i < rings; i++) inner = `<span class="score-ring circle">${inner}</span>`;
    } else if (off > 0) {
      const rings = Math.min(off, 4);
      for (let i = 0; i < rings; i++) inner = `<span class="score-ring square">${inner}</span>`;
    }
    chip.innerHTML = inner;

    chip.addEventListener('click', () => {
      selectedScore = score;
      selectChip(row, score, false);
    });
    row.appendChild(chip);
    if (off === -1) chip.dataset.isBirdie = 'true';
  });

  const birdieChip = row.querySelector('[data-is-birdie="true"]');
  if (birdieChip) row.scrollLeft = birdieChip.offsetLeft - 8;
}

document.getElementById('putts-chip-row').querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    selectedPutts = parseInt(chip.dataset.value);
    selectChip(chip.parentElement, selectedPutts, false);
  });
});

document.getElementById('fairway-chip-row').querySelectorAll('.icon-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    selectedFairway = chip.dataset.value;
    selectChip(chip.parentElement, selectedFairway, true);
  });
});

document.getElementById('green-chip-row').querySelectorAll('.icon-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    selectedGreen = chip.dataset.value;
    selectChip(chip.parentElement, selectedGreen, true);
  });
});

async function loadExistingHoleScore() {
  document.getElementById('score-sheet-title').textContent = `Hole ${currentHoleNumber}`;
  buildScoreChips(currentPar);
  document.getElementById('fairway-row-wrap').style.display = currentPar === 3 ? 'none' : 'block';

  selectedScore = null; selectedPutts = null; selectedFairway = null; selectedGreen = null;
  document.querySelectorAll('.chip, .icon-chip').forEach(el => el.classList.remove('selected'));
  document.getElementById('score-status').textContent = '';
  currentHoleScoreId = null;

  const openBtn = document.getElementById('open-score-btn');
  openBtn.textContent = 'Enter hole score';
  openBtn.classList.remove('saved');

  try {
    const existing = await supabaseRequest('GET', `hole_scores?round_id=eq.${roundId}&hole_id=eq.${currentHoleId}&select=*`);
    if (existing.length > 0) {
      const hs = existing[0];
      currentHoleScoreId = hs.hole_score_id;
      selectedScore = hs.score; selectedPutts = hs.putts;
      selectedFairway = hs.fairway_result; selectedGreen = hs.green_result;
      if (selectedScore != null) selectChip(document.getElementById('score-chip-row'), selectedScore, false);
      if (selectedPutts != null) selectChip(document.getElementById('putts-chip-row'), Math.min(selectedPutts, 3), false);
      if (selectedFairway) selectChip(document.getElementById('fairway-chip-row'), selectedFairway, true);
      if (selectedGreen) selectChip(document.getElementById('green-chip-row'), selectedGreen, true);
      openBtn.textContent = `Score: ${hs.score} -- edit`;
      openBtn.classList.add('saved');
    }
  } catch (e) { document.getElementById('score-status').textContent = 'Failed to load: ' + e.message; }
}

function openSheet() {
  document.getElementById('score-sheet').classList.add('open');
  document.getElementById('score-sheet-backdrop').classList.add('open');
}
function closeSheet() {
  document.getElementById('score-sheet').classList.remove('open');
  document.getElementById('score-sheet-backdrop').classList.remove('open');
}
document.getElementById('open-score-btn').addEventListener('click', openSheet);
document.getElementById('close-sheet-btn').addEventListener('click', closeSheet);
document.getElementById('score-sheet-backdrop').addEventListener('click', () => { closeSheet(); closeScorecard(); closeBreakdown(); });

async function openScorecard() {
  const tableEl = document.getElementById('scorecard-table');
  const infoEl = document.getElementById('scorecard-course-info');
  tableEl.innerHTML = 'Loading...';
  infoEl.textContent = '';
  document.getElementById('scorecard-sheet').classList.add('open');
  document.getElementById('score-sheet-backdrop').classList.add('open');

  try {
    const [scores, teeHoles, teeInfo] = await Promise.all([
      supabaseRequest('GET', `hole_scores?round_id=eq.${roundId}&select=hole_id,score,putts`),
      supabaseRequest('GET', `tee_holes?tee_id=eq.${lockedTeeId}&select=hole_id,yardage,handicap_index`),
      supabaseRequest('GET', `tees?tee_id=eq.${lockedTeeId}&select=total_yards,slope_rating,course_rating`)
    ]);

    const scoreByHole = {};
    scores.forEach(s => { scoreByHole[s.hole_id] = s; });
    const teeHoleByHole = {};
    teeHoles.forEach(t => { teeHoleByHole[t.hole_id] = t; });

    const tee = teeInfo[0];
    infoEl.textContent = `${tee.total_yards} yds \u00b7 Slope ${tee.slope_rating} \u00b7 Rating ${tee.course_rating}`;

    let parTotal = 0, scoreTotal = 0, playedCount = 0;
    let holeHeaderCells = '', yardsCells = '', parCells = '', hcpCells = '', scoreCells = '';

    holeOrder.forEach(h => {
      const s = scoreByHole[h.hole_id];
      const th = teeHoleByHole[h.hole_id];
      parTotal += h.par;
      holeHeaderCells += `<th>${h.hole_number}</th>`;
      yardsCells += `<td>${th ? th.yardage : '--'}</td>`;
      parCells += `<td>${h.par}</td>`;
      hcpCells += `<td>${th ? th.handicap_index : '--'}</td>`;
      if (s) { scoreTotal += s.score; playedCount++; }
      scoreCells += `<td>${s ? s.score : '--'}</td>`;
    });

    const playedPar = holeOrder.slice(0, playedCount).reduce((a, h) => a + h.par, 0);
    const toPar = playedCount > 0 ? scoreTotal - playedPar : 0;
    const toParStr = toPar > 0 ? `+${toPar}` : (toPar === 0 ? 'E' : toPar);

    tableEl.innerHTML = `
      <table class="scorecard-table">
        <tr><th class="sc-label-col">Hole</th>${holeHeaderCells}<th class="sc-total-col">Total</th></tr>
        <tr><td class="sc-label-col">Yards</td>${yardsCells}<td class="sc-total-col">${tee.total_yards}</td></tr>
        <tr><td class="sc-label-col">Par</td>${parCells}<td class="sc-total-col">${parTotal}</td></tr>
        <tr><td class="sc-label-col">Hcp</td>${hcpCells}<td class="sc-total-col"></td></tr>
        <tr><td class="sc-label-col">Score</td>${scoreCells}<td class="sc-total-col">${playedCount > 0 ? scoreTotal + ' (' + toParStr + ')' : '--'}</td></tr>
      </table>
    `;
  } catch (e) {
    tableEl.innerHTML = `<p style="color:#f88;">Failed to load: ${e.message}</p>`;
  }
}
function closeBreakdown() {
  document.getElementById('breakdown-sheet').classList.remove('open');
}
document.getElementById('close-breakdown-btn').addEventListener('click', closeBreakdown);

function closeScorecard() {
  document.getElementById('scorecard-sheet').classList.remove('open');
}
document.getElementById('scorecard-btn').addEventListener('click', openScorecard);
document.getElementById('close-scorecard-btn').addEventListener('click', closeScorecard);

document.getElementById('quit-round-btn').addEventListener('click', () => {
  if (confirm('Quit this round? Your saved scores stay recorded, but you\'ll leave the live round screen.')) {
    window.location.href = 'index.html';
  }
});

document.getElementById('caddie-btn').addEventListener('click', () => {
  alert('AI Caddie -- coming soon.');
});

document.getElementById('save-score-btn').addEventListener('click', async () => {
  const statusEl = document.getElementById('score-status');
  statusEl.style.color = '#f88'; statusEl.textContent = 'Saving...';
  if (selectedScore == null || selectedPutts == null) { statusEl.textContent = 'Pick a score and putts.'; return; }
  const data = {
    round_id: roundId, hole_id: currentHoleId,
    score: selectedScore, putts: selectedPutts,
    fairway_result: selectedFairway || null,
    green_result: selectedGreen || null
  };
  try {
    if (currentHoleScoreId) await supabaseRequest('PATCH', `hole_scores?hole_score_id=eq.${currentHoleScoreId}`, data);
    else { const created = await supabaseRequest('POST', 'hole_scores', data); currentHoleScoreId = created[0].hole_score_id; }
    statusEl.style.color = '#5f5'; statusEl.textContent = 'Saved.';
    const openBtn = document.getElementById('open-score-btn');
    openBtn.textContent = `Score: ${selectedScore} -- edit`;
    openBtn.classList.add('saved');
    setTimeout(closeSheet, 500);
  } catch (e) { statusEl.style.color = '#f88'; statusEl.textContent = 'Save failed: ' + e.message; }
});

function enterRoundScreen(courseId, courseName) {
  lockedCourseId = courseId;
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('round-screen').style.display = 'block';
  mapboxgl.accessToken = MAPBOX_TOKEN;
  map = new mapboxgl.Map({ container: 'map', style: 'mapbox://styles/mapbox/satellite-v9', center: [-84.4569, 39.1031], zoom: 16 });
  map.on('load', () => {
    map.addSource('shot-line', { type: 'geojson', data: { type: 'Feature', geometry: { type: 'LineString', coordinates: [] } } });
    map.addLayer({
      id: 'shot-line', type: 'line', source: 'shot-line',
      paint: { 'line-color': '#ffffff', 'line-width': 2, 'line-dasharray': [2, 2] }
    });
    map.addSource('layup-line', { type: 'geojson', data: { type: 'Feature', geometry: { type: 'LineString', coordinates: [] } } });
    map.addLayer({
      id: 'layup-line', type: 'line', source: 'layup-line',
      paint: { 'line-color': '#ffb877', 'line-width': 2, 'line-dasharray': [1, 2] }
    });
    loadHolesForLockedCourse();
  });
  map.on('click', (e) => {
    currentTarget = { lat: e.lngLat.lat, lon: e.lngLat.lng };
    userMovedTarget = true;
    ensureTargetMarker();
    updateDistanceDisplay();
  });
  loadBagClubsForRound();
}

async function loadBagClubsForRound() {
  try {
    const bags = await supabaseRequest('GET', `bags?player_id=eq.${playerId}&active=eq.true&select=bag_id`);
    if (bags.length === 0) return;
    bagClubs = await supabaseRequest('GET', `clubs?bag_id=eq.${bags[0].bag_id}&select=club_id,club_type,typical_yardage&order=typical_yardage.desc.nullslast`);
    const select = document.getElementById('club-select');
    select.innerHTML = '<option value="">No club</option>';
    bagClubs.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.club_id;
      opt.textContent = c.typical_yardage ? `${c.club_type} (${c.typical_yardage}y)` : c.club_type;
      opt.dataset.yardage = c.typical_yardage || '';
      select.appendChild(opt);
    });
  } catch (e) {
    document.getElementById('status').textContent = 'Failed to load clubs: ' + e.message;
  }
}

document.getElementById('club-select').addEventListener('change', (e) => {
  const opt = e.target.selectedOptions[0];
  selectedClubYardage = opt && opt.dataset.yardage ? parseFloat(opt.dataset.yardage) : null;
  if (!userMovedTarget) {
    currentTarget = computeSmartDefaultTarget();
    ensureTargetMarker();
    updateDistanceDisplay();
  }
});

async function resumeExistingRound() {
  playerId = await resolveCurrentPlayer();
  const rounds = await supabaseRequest('GET', `rounds?round_id=eq.${roundId}&select=tee_id`);
  const teeId = rounds[0].tee_id;
  lockedTeeId = teeId;
  const tees = await supabaseRequest('GET', `tees?tee_id=eq.${teeId}&select=course_id`);
  const courseId = tees[0].course_id;
  const courses = await supabaseRequest('GET', `courses?course_id=eq.${courseId}&select=course_name`);
  enterRoundScreen(courseId, courses[0].course_name);
}

if (!getAccessToken()) {
  document.getElementById('no-player-warning').style.display = 'block';
  document.getElementById('setup-fields').style.display = 'none';
} else if (roundId) {
  resumeExistingRound();
} else {
  initSetupScreen();
}
</script>
